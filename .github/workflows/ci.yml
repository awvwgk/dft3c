name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-file: environment-cpu.yml
        environment-name: dft3c
        cache-environment: true
        cache-downloads: true

    - name: Install package in development mode
      run: |
        pip install -e . --no-deps
      shell: micromamba-shell {0}

    - name: Run pre-commit hooks
      run: |
        pre-commit install
        pre-commit run --all-files
      shell: micromamba-shell {0}

  test:
    runs-on: ubuntu-latest
    needs:
      - lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        pyscf-version: ["2.9", "2.11"]

    name: "Python=${{ matrix.python-version }} & PySCF=${{ matrix.pyscf-version }}"
    steps:
    - uses: actions/checkout@v4

    - name: Setup micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-file: environment-cpu.yml
        environment-name: dft3c
        cache-environment: true
        cache-downloads: true
        create-args: >-
          python=${{ matrix.python-version }}
          pyscf=${{ matrix.pyscf-version }}

    - name: Install package in development mode
      run: |
        pip install -e . --no-deps
      shell: micromamba-shell {0}

    - name: Run tests with coverage
      run: >-
        pytest
        -v
        --cov=dft3c --cov-report=xml --cov-report=term-missing --cov-report=html
        --durations=50 --durations-min=1.0
        tests/
      shell: micromamba-shell {0}
